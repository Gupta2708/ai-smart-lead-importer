services:
  - type: web
    name: groweasy-csv-importer-api
    runtime: node
    rootDir: .
    buildCommand: corepack pnpm install --frozen-lockfile=false && corepack pnpm --filter @groweasy/api build
    startCommand: corepack pnpm --filter @groweasy/api start
    envVars:
      - key: AI_PROVIDER
        value: gemini
      - key: FRONTEND_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
